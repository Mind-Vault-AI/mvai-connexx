<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MVAI Connexx</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #0f0f0f;
            --accent: #10b981;
            --text: #e0e0e0;
            --dim: #666;
            --border: #2a2a2a;
            --error: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            width: 100%;
            max-width: 380px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 36px 32px;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .shield { font-size: 2rem; margin-bottom: 8px; }
        .header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
        .header p { color: var(--dim); font-size: 0.82rem; margin-top: 4px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        input[type="password"]:focus { outline: none; border-color: var(--accent); }
        .btn {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn:hover { background: #059669; }
        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            border-left: 3px solid var(--error);
            background: rgba(255,68,68,0.08);
            color: var(--error);
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 0.82rem;
            color: var(--dim);
            text-decoration: none;
        }
        .back:hover { color: var(--text); }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <div class="shield">🔐</div>
            <h1>ADMIN TOEGANG</h1>
            <p>MVAI Connexx — Beheerportaal</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <label for="access_code">Admin Access Code</label>
            <input type="password" id="access_code" name="access_code"
                   placeholder="••••••••••••••••"
                   required autofocus autocomplete="off">
            <button type="submit" class="btn">Inloggen als Admin</button>
        </form>

        <a href="/login" class="back">← Terug naar klant login</a>
    </div>
</body>
</html>
