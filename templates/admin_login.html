<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MVAI Connexx</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --green: #10b981;
            --green-bright: #34d399;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #f0f0f0;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Background elements */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(16,185,129,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16,185,129,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .corner-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.08;
            background: radial-gradient(circle, #10b981, transparent 70%);
            z-index: 0;
        }
        .corner-glow.tl { top: -150px; left: -100px; }
        .corner-glow.br { bottom: -150px; right: -100px; animation: pulse-glow 6s ease-in-out infinite alternate; }

        @keyframes pulse-glow {
            from { opacity: 0.06; }
            to { opacity: 0.12; }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(16,185,129,0.12);
            border-radius: 18px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(16,185,129,0.06),
                0 24px 64px rgba(0,0,0,0.9),
                0 0 60px rgba(16,185,129,0.04);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .shield-wrap {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(16,185,129,0.1);
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
        }
        .header p {
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Warning strip */
        .warning {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,170,0,0.06);
            border: 1px solid rgba(255,170,0,0.12);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 24px;
            font-size: 0.75rem;
            color: rgba(255,170,0,0.6);
            letter-spacing: 0.3px;
        }

        label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            color: #f0f0f0;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.25s;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: rgba(16,185,129,0.4);
            background: rgba(16,185,129,0.03);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.07), 0 0 16px rgba(16,185,129,0.06);
        }
        input::placeholder { letter-spacing: 3px; color: rgba(255,255,255,0.15); }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.88rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(16,185,129,0.2);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(16,185,129,0.35);
        }
        .btn:active { transform: translateY(0); }

        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 0.82rem;
            border-left: 3px solid #ff4444;
            background: rgba(255,68,68,0.07);
            color: #ff6b6b;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }
        .back:hover { color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="corner-glow tl"></div>
    <div class="corner-glow br"></div>

    <div class="card">
        <div class="header">
            <div class="shield-wrap">🔐</div>
            <h1>Admin Toegang</h1>
            <p>MVAI Connexx — Beheerportaal</p>
        </div>

        <div class="warning">
            <span>⚠</span> Beperkte toegang — alleen geautoriseerd personeel
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <label for="access_code">Admin Access Code</label>
            <input
                type="password"
                id="access_code"
                name="access_code"
                placeholder="••••••••••••••••"
                required autofocus autocomplete="off"
            >
            <button type="submit" class="btn">Inloggen als Admin</button>
        </form>

        <a href="/login" class="back">← Terug naar klant login</a>
    </div>
</body>
</html>
